---
- name: Setup remote user and SSH
  hosts: managed
  become: true

  vars:
    new_user: devops
    user_pub_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

  tasks:
    - name: Создать пользователя
      ansible.builtin.user:
        name: "{{ new_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Дать sudo без пароля
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ new_user }}"
        content: "{{ new_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Добавить SSH ключ пользователю
      ansible.posix.authorized_key:
        user: "{{ new_user }}"
        state: present
        key: "{{ user_pub_key }}"

    - name: Отключить авторизацию по паролю SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    - name: Создать директорию в /opt/
      ansible.builtin.file:
        path: "/opt/{{ new_user }}_workdir"
        state: directory
        owner: "{{ new_user }}"
        group: "{{ new_user }}"
        mode: "0660"

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted
